name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint (flake8, black, isort)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install linters
        run: |
          python -m pip install --no-cache-dir flake8 black isort

      - name: Lint with flake8
        run: |
          flake8 src/ --max-line-length=100 --count --statistics

      - name: Check formatting with black
        run: |
          black --check src/ tests/

      - name: Check import ordering with isort
        run: |
          isort --check-only src/ tests/

  unit-test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --no-cache-dir -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --cov=src/secrag --cov-report=term-missing --cov-fail-under=14

  integration-test:
    name: Integration Tests (Qdrant + Redis)
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:latest
        options: >-
          --health-cmd "curl -f http://localhost:6333/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6333:6333

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --no-cache-dir -e ".[dev]"

      - name: Run integration tests
        env:
          QDRANT_URL: http://localhost:6333
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/integration/ -v

  frontend:
    name: Frontend (build + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (includes TypeScript check)
        working-directory: frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  ragas-gate:
    name: Ragas Quality Gate
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --no-cache-dir -e "."

      - name: Run Ragas evaluation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
        run: |
          python scripts/evaluate_ragas.py

      - name: Check Faithfulness gate (F >= 0.85)
        run: |
          python scripts/assert_faithfulness_gate.py --threshold=0.85

  security-scan:
    name: Security Scan (secrets + deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, unit-test, integration-test, frontend, ragas-gate, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -t hina-backend:latest .

      - name: Build frontend image
        run: |
          docker build -t hina-frontend:latest ./frontend \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:8000
